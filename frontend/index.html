<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0c" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='2' fill='%230a0a0c'/%3E%3Cpath d='M5 20l6-7 5 4 5-9 6 8' fill='none' stroke='%23f5b13d' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <title>Market Alerts</title>
    <!-- Resolve the theme before React paints — no flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ma-theme')
          if (t !== 'light' && t !== 'dark')
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          document.documentElement.classList.toggle('dark', t === 'dark')
          document.documentElement.dataset.theme = t
          document
            .querySelector('meta[name=theme-color]')
            .setAttribute('content', t === 'dark' ? '#0a0a0c' : '#f3efe6')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
