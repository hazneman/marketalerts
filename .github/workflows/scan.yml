# Daily SMA-cross scan. Commits fresh JSON only when the market produced a new
# bar, which is what triggers the Netlify deploy. Never triggered by push, and
# GITHUB_TOKEN commits can't re-trigger workflows — no commit loop possible.
name: daily-scan

on:
  schedule:
    # 22:30 UTC = 5:30 pm ET (summer) / 6:30 pm ET (winter) — always after close
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: daily-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scan
        run: python scanner/scan.py

      - name: Commit data if changed
        run: |
          git config user.name "market-alerts-bot"
          git config user.email "actions@github.com"
          git add frontend/public/data archive
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "scan: $(date -u +%F)"
          # A manual push (or an overlapping run) may have moved main between
          # our checkout and now. Each attempt rebases our single data commit
          # onto the latest origin/main and pushes; -X theirs keeps THIS run's
          # freshly generated data on any conflict (both sides are the same
          # trading bar, so either is correct). Retry covers a fresh race.
          for attempt in 1 2 3 4 5; do
            git pull --rebase -X theirs origin main
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — re-syncing with origin/main…"
            sleep $((attempt * 3))
          done
          echo "Push failed after retries." >&2
          exit 1
