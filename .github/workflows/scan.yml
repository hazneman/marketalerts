# Daily SMA-cross scan. Commits fresh JSON only when the market produced a new
# bar, which is what triggers the Netlify deploy. Never triggered by push, and
# GITHUB_TOKEN commits can't re-trigger workflows — no commit loop possible.
name: daily-scan

on:
  schedule:
    # 22:30 UTC = 5:30 pm ET (summer) / 6:30 pm ET (winter) — always after close
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: daily-scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Run scan
        run: python scanner/scan.py

      - name: Commit data if changed
        run: |
          git config user.name "market-alerts-bot"
          git config user.email "actions@github.com"
          git add frontend/public/data
          git diff --cached --quiet || (git commit -m "scan: $(date -u +%F)" && git push)
